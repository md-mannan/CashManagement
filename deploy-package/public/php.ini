; PHP Configuration for Cash Management System
; Remove file size restrictions for gallery uploads

; File upload settings
upload_max_filesize = 0
post_max_size = 0
max_file_uploads = 20

; Execution time and memory
max_execution_time = 300
max_input_time = 300
memory_limit = 512M

; Error reporting (for development)
display_errors = On
log_errors = On
error_log = /tmp/php_errors.log
